<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.scene{display:flex;align-items:center;justify-content:center;padding:2rem 0;position:relative}
.phone{position:relative;width:290px;height:600px;background:#111;border-radius:52px;padding:10px;box-shadow:0 40px 80px -20px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.06) inset,0 2px 0 rgba(255,255,255,.04) inset}
.phone::before{content:'';position:absolute;top:10px;right:-2px;width:3px;height:28px;background:#222;border-radius:0 2px 2px 0}
.phone::after{content:'';position:absolute;top:68px;left:-2px;width:3px;height:55px;background:#222;border-radius:2px 0 0 2px;box-shadow:0 36px 0 #222,0 -20px 0 #222}
.screen{position:relative;width:100%;height:100%;background:#0a0a0a;border-radius:42px;overflow:hidden}
.di{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:100px;height:28px;background:#000;border-radius:20px;z-index:30;box-shadow:0 0 0 1px rgba(255,255,255,.04)}
.di::after{content:'';position:absolute;top:8px;right:24px;width:10px;height:10px;background:radial-gradient(circle,#1a1a2e 40%,#111 41%);border-radius:50%}
.status{position:absolute;top:8px;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:0 28px;font:500 11px 'Plus Jakarta Sans',sans-serif;color:rgba(255,255,255,.7)}
.header{padding:50px 20px 16px;background:linear-gradient(135deg,#FF7A00 0%,#e06800 100%);position:relative;overflow:hidden}
.header::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:rgba(255,255,255,.08);border-radius:50%}
.header-top{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
.logo{font:800 16px 'Sora',sans-serif;color:#fff;letter-spacing:-.02em}
.location{display:flex;align-items:center;gap:4px;margin-top:6px;position:relative;z-index:2}
.location span{font:400 10.5px 'Plus Jakarta Sans',sans-serif;color:rgba(255,255,255,.7)}
.loc-dot{width:5px;height:5px;background:#fff;border-radius:50%;opacity:.7}
.search{margin:0 16px;position:relative;z-index:5;transform:translateY(-14px)}
.search-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--color-background-primary,#fff);border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.12),0 0 0 .5px rgba(0,0,0,.04)}
.search-bar svg{opacity:.3;flex-shrink:0}
.search-bar span{font:400 12px 'Plus Jakarta Sans',sans-serif;color:rgba(0,0,0,.3)}
.cards{padding:0 16px;display:flex;flex-direction:column;gap:8px;transform:translateY(-6px)}
.card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.06);border-radius:16px;opacity:0;animation:cardIn .5s ease forwards}
.card:nth-child(1){animation-delay:.3s}
.card:nth-child(2){animation-delay:.5s}
.card:nth-child(3){animation-delay:.7s}
.card:nth-child(4){animation-delay:.9s}
@keyframes cardIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.card-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:linear-gradient(135deg,rgba(255,122,0,.12),rgba(176,136,201,.12))}
.card-info{flex:1;min-width:0}
.card-name{font:600 12px 'Plus Jakarta Sans',sans-serif;color:#f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:5px;margin-top:2px}
.card-cat{font:400 10px 'Plus Jakarta Sans',sans-serif;color:rgba(255,255,255,.4)}
.card-rating{display:flex;align-items:center;gap:2px;font:600 10px 'Plus Jakarta Sans',sans-serif;color:#FF7A00}
.card-rating svg{width:9px;height:9px;fill:#FF7A00}
.card-wa{width:30px;height:30px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-wa svg{width:14px;height:14px;fill:#fff}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;padding:10px 24px 24px;display:flex;justify-content:space-around;align-items:center;background:linear-gradient(transparent,rgba(10,10,10,.95) 40%)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-item svg{width:18px;height:18px;stroke:rgba(255,255,255,.3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-item.active svg{stroke:#FF7A00}
.nav-item span{font:500 9px 'Plus Jakarta Sans',sans-serif;color:rgba(255,255,255,.3)}
.nav-item.active span{color:#FF7A00}
.home-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:110px;height:4px;background:rgba(255,255,255,.15);border-radius:4px}
.float{position:absolute;z-index:40;background:var(--color-background-primary,#fff);border-radius:16px;padding:8px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(0,0,0,.15),0 0 0 .5px rgba(0,0,0,.04);animation:floatUp 3s ease-in-out infinite}
.float-1{top:60px;right:-50px;animation-delay:0s}
.float-2{bottom:160px;left:-44px;animation-delay:1.2s}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.float-icon{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.float-text{font:600 11px 'Plus Jakarta Sans',sans-serif;color:var(--color-text-primary,#111);white-space:nowrap}
@media(prefers-color-scheme:dark){
  .search-bar{background:var(--color-background-primary,#1a1a1a);box-shadow:0 4px 20px rgba(0,0,0,.3),0 0 0 .5px rgba(255,255,255,.06)}
  .search-bar span{color:rgba(255,255,255,.3)}
  .float{background:var(--color-background-primary,#1a1a1a);box-shadow:0 8px 30px rgba(0,0,0,.4),0 0 0 .5px rgba(255,255,255,.06)}
  .float-text{color:var(--color-text-primary,#f0f0f0)}
}
.promo{margin:0 16px;padding:10px 14px;border-radius:14px;background:linear-gradient(135deg,rgba(255,122,0,.1),rgba(176,136,201,.1));border:.5px solid rgba(255,122,0,.15);display:flex;align-items:center;gap:10px;transform:translateY(-2px);opacity:0;animation:cardIn .5s ease forwards;animation-delay:1.1s}
.promo-badge{font:700 9px 'Sora',sans-serif;color:#FF7A00;background:rgba(255,122,0,.15);padding:3px 8px;border-radius:6px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.promo-text{font:400 10px 'Plus Jakarta Sans',sans-serif;color:rgba(255,255,255,.5);line-height:1.35}
</style>
